<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogg</title>
  </head>
  <body>
    <script>
      (function () {
        var base = '/catalogg/';
        var path = window.location.pathname;
        var route = path.indexOf(base) === 0 ? path.slice(base.length) : path.replace(/^\/+/, '');
        var target = '/' + route + window.location.search + window.location.hash;

        try {
          window.sessionStorage.setItem('catalogg:redirect', target);
        } catch (error) {
          // Ignore storage errors and still return the user to the app shell.
        }

        window.location.replace(base);
      })();
    </script>
  </body>
</html>
